name: CI

on:
  push:
    branches: [main]
    # Docs and the showcase page ship no code — rebuilding the image for them
    # costs minutes and changes nothing about what runs.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Dummy keys so the app's modules import (the SDK clients are built at
    # import time). No real API is ever called — the tests mock every client.
    env:
      ANTHROPIC_API_KEY: test-key
      OPENAI_API_KEY: test-key
      ELEVENLABS_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  deploy:
    # Only main, and only once the tests are green.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token Google trusts
    steps:
      - uses: actions/checkout@v4

      # No service-account key anywhere: GitHub proves who it is with a
      # short-lived OIDC token and Google hands back a short-lived credential.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy daily-coach \
            --source . \
            --region asia-east1 \
            --project ${{ secrets.GCP_PROJECT }} \
            --quiet

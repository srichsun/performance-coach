name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Dummy keys so the app's modules import (the SDK clients are built at
    # import time). No real API is ever called — the tests mock every client.
    env:
      ANTHROPIC_API_KEY: test-key
      OPENAI_API_KEY: test-key
      ELEVENLABS_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q
